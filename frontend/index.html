<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket Booking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }

    .user-selector { display: flex; align-items: center; gap: 0.5rem; }
    .user-selector label { font-size: 0.875rem; color: #ccc; }
    .user-selector select {
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      background: #fff;
      cursor: pointer;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
    }
    nav button {
      padding: 0.75rem 1.5rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      color: #555;
    }
    nav button.active {
      border-bottom-color: #1a1a2e;
      color: #1a1a2e;
      font-weight: 600;
    }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    .page { display: none; }
    .page.active { display: block; }

    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #333; }

    /* ── Event cards ─────────────────────────────────────────────────────────── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .event-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .event-card h3 { font-size: 1rem; font-weight: 700; }
    .event-card .meta { font-size: 0.8rem; color: #666; }
    .event-card .venue { font-size: 0.8rem; color: #888; }

    .capacity-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.25rem;
    }
    .capacity-bar-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .capacity-bar-fill.warn { background: #ff9800; }
    .capacity-bar-fill.full { background: #f44336; }
    .capacity-label {
      font-size: 0.78rem;
      color: #555;
      display: flex;
      justify-content: space-between;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    .btn {
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary   { background: #1a1a2e; color: #fff; }
    .btn-primary:hover:not(:disabled)   { background: #2d2d5e; }
    .btn-success   { background: #388e3c; color: #fff; }
    .btn-success:hover:not(:disabled)   { background: #2e7d32; }
    .btn-danger    { background: #f44336; color: #fff; }
    .btn-danger:hover:not(:disabled)    { background: #c62828; }
    .btn-outline   { background: transparent; color: #1a1a2e; border: 1.5px solid #1a1a2e; }
    .btn-outline:hover:not(:disabled)  { background: #f0f0f8; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; }

    .badge-sold-out {
      display: inline-block;
      background: #f44336;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Seat selection modal ────────────────────────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      padding: 1rem;
    }
    .modal-overlay.hidden { display: none; }

    .modal {
      background: #fff;
      border-radius: 12px;
      width: 100%;
      max-width: 620px;
      max-height: 85vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .modal-header {
      padding: 1.25rem 1.5rem 1rem;
      border-bottom: 1px solid #ececec;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }
    .modal-header h3 { font-size: 1.05rem; font-weight: 700; }
    .modal-header .subtitle { font-size: 0.8rem; color: #777; margin-top: 0.2rem; }
    .modal-close {
      background: none;
      border: none;
      font-size: 1.4rem;
      cursor: pointer;
      color: #888;
      line-height: 1;
      padding: 0.1rem;
    }
    .modal-close:hover { color: #333; }
    .modal-body { padding: 1rem 1.5rem; flex: 1; }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid #ececec;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      position: sticky;
      bottom: 0;
      background: #fff;
    }
    .modal-footer .total-price {
      font-size: 0.9rem;
      color: #333;
    }
    .modal-footer .total-price strong { font-size: 1.1rem; color: #1a1a2e; }

    /* Ticket items */
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin: 1rem 0 0.5rem;
    }
    .section-label:first-child { margin-top: 0; }

    .ticket-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.5rem;
    }
    .ticket-chip {
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      user-select: none;
    }
    .ticket-chip:hover:not(.unavailable) { border-color: #1a1a2e; background: #f7f7fb; }
    .ticket-chip.selected { border-color: #1a1a2e; background: #eeeef8; }
    .ticket-chip.unavailable { opacity: 0.4; cursor: not-allowed; }
    .ticket-chip input[type="checkbox"] { display: none; }
    .ticket-chip .seat-label { font-size: 0.85rem; font-weight: 600; color: #222; }
    .ticket-chip .seat-price { font-size: 0.75rem; color: #777; margin-top: 0.15rem; }
    .ticket-chip .seat-status { font-size: 0.7rem; color: #f44336; margin-top: 0.15rem; }

    /* ── Toast ───────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #388e3c; }
    #toast.error   { background: #d32f2f; }

    /* ── Bookings list ───────────────────────────────────────────────────────── */
    .booking-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .booking-item {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .booking-item.reserved { border-left: 4px solid #ff9800; }
    .booking-item.confirmed { border-left: 4px solid #4caf50; }

    .booking-item .info h3 { font-size: 0.95rem; font-weight: 600; }
    .booking-item .info p { font-size: 0.8rem; color: #777; margin-top: 0.2rem; }
    .booking-item .info .booking-id { font-size: 0.75rem; color: #aaa; margin-top: 0.15rem; font-family: monospace; }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-reserved-label  { background: #fff3e0; color: #e65100; }
    .badge-confirmed-label { background: #e8f5e9; color: #1b5e20; }
    .badge-cancelled-label { background: #fafafa; color: #999; }

    .countdown {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #e65100;
      margin-top: 0.3rem;
    }
    .countdown.urgent { color: #d32f2f; }
    .countdown.expired { color: #999; }

    .booking-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .empty-state { color: #999; font-size: 0.9rem; text-align: center; padding: 3rem 0; }

    .spinner {
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      width: 28px; height: 28px;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🎟 Event Booking</h1>
  <div class="user-selector">
    <label for="userSelect">Booking as:</label>
    <select id="userSelect">
      <option value="">— select user —</option>
    </select>
  </div>
</header>

<nav>
  <button class="active" onclick="showPage('events', this)">Events</button>
  <button onclick="showPage('bookings', this)">My Bookings</button>
</nav>

<main>
  <div id="page-events" class="page active">
    <h2>Upcoming Events</h2>
    <div id="events-container"><div class="spinner"></div></div>
  </div>

  <div id="page-bookings" class="page">
    <h2>My Bookings</h2>
    <div id="bookings-container"><div class="spinner"></div></div>
  </div>
</main>

<!-- Seat selection modal -->
<div id="seatModal" class="modal-overlay hidden" onclick="handleModalBackdropClick(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div>
        <h3 id="modalEventName">Select Seats</h3>
        <div class="subtitle" id="modalEventMeta"></div>
      </div>
      <button class="modal-close" onclick="closeSeatModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="spinner"></div>
    </div>
    <div class="modal-footer">
      <div class="total-price">
        Selected: <strong id="selectedTotal">$0.00</strong>
        <span id="selectedCount" style="color:#777; font-size:0.8rem;"></span>
      </div>
      <button id="reserveBtn" class="btn btn-primary" disabled onclick="reserveSelected()">
        Reserve Seats
      </button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // Same hostname as the page (localhost vs 127.0.0.1) so the browser origin matches the API host.
  const API = `http://${window.location.hostname}:8085`;
  const RESERVATION_TTL_MS = 10 * 60 * 1000; // 10 minutes

  // ── State ──────────────────────────────────────────────────────────────────
  let currentUserID = '';
  let eventsCache   = [];

  // Seat modal state
  let modalEventID   = null;
  let selectedTickets = {}; // ticketId → ticket object

  // Countdown timer intervals keyed by bookingId
  let countdownIntervals = {};

  // ── Helpers ────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3500);
  }

  function showPage(name, btn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    btn.classList.add('active');
    if (name === 'bookings') loadMyBookings();
    if (name === 'events')   loadEvents();
  }

  async function apiFetch(path, options = {}) {
    const uid = currentUserID;
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (uid) headers['X-User-ID'] = uid;
    const res = await fetch(`${API}${path}`, { ...options, headers });
    if (res.status === 204) return null;
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    return body;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatCurrency(n) {
    return '$' + Number(n).toFixed(2);
  }

  // ── Users ──────────────────────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const data = await apiFetch('/users');
      const sel = document.getElementById('userSelect');
      (data.users || []).forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.name;
        sel.appendChild(opt);
      });
    } catch (e) {
      console.error('Failed to load users', e);
    }
  }

  document.getElementById('userSelect').addEventListener('change', e => {
    currentUserID = e.target.value;
    loadEvents();
  });

  // ── Events ─────────────────────────────────────────────────────────────────
  async function loadEvents() {
    const container = document.getElementById('events-container');
    container.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await apiFetch('/events');
      eventsCache = data.events || [];
      renderEvents(eventsCache);
    } catch (e) {
      container.innerHTML = `<p class="empty-state">Failed to load events: ${escHtml(e.message)}</p>`;
    }
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    if (!events || events.length === 0) {
      container.innerHTML = '<p class="empty-state">No events found.</p>';
      return;
    }
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'events-grid';
    events.forEach(ev => grid.appendChild(buildEventCard(ev)));
    container.appendChild(grid);
  }

  function buildEventCard(ev) {
    const isSoldOut   = ev.availableCount === 0;
    const booked      = ev.capacity - ev.availableCount;
    const pct         = ev.capacity > 0 ? Math.round((booked / ev.capacity) * 100) : 0;
    const fillClass   = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : '';
    const date        = new Date(ev.dateTime).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });

    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <h3>${escHtml(ev.name)}</h3>
      <p class="meta">📅 ${date}</p>
      <p class="venue">📍 ${escHtml(ev.venue?.name || '')} &nbsp;·&nbsp; 🎤 ${escHtml(ev.performer?.name || '')}</p>
      <div class="capacity-label">
        <span>${isSoldOut
          ? '<span class="badge-sold-out">Sold out</span>'
          : `${ev.availableCount} seat${ev.availableCount !== 1 ? 's' : ''} available`
        }</span>
        <span>${booked} / ${ev.capacity} booked</span>
      </div>
      <div class="capacity-bar">
        <div class="capacity-bar-fill ${fillClass}" style="width:${pct}%"></div>
      </div>
    `;

    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.style.marginTop = 'auto';
    btn.textContent = isSoldOut ? 'Sold Out' : 'Select Seats';
    btn.disabled    = isSoldOut || !currentUserID;
    btn.title       = !currentUserID ? 'Select a user first' : '';
    btn.onclick     = () => openSeatModal(ev);
    card.appendChild(btn);

    return card;
  }

  // ── Seat selection modal ────────────────────────────────────────────────────

  async function openSeatModal(ev) {
    if (!currentUserID) { showToast('Please select a user first', 'error'); return; }

    // Reset state
    modalEventID    = ev.id;
    selectedTickets = {};

    // Show modal with spinner
    document.getElementById('modalEventName').textContent = ev.name;
    document.getElementById('modalEventMeta').textContent =
      new Date(ev.dateTime).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
      + '  ·  ' + (ev.venue?.name || '');
    document.getElementById('modalBody').innerHTML = '<div class="spinner"></div>';
    document.getElementById('selectedTotal').textContent = '$0.00';
    document.getElementById('selectedCount').textContent = '';
    document.getElementById('reserveBtn').disabled = true;
    document.getElementById('seatModal').classList.remove('hidden');

    try {
      // Fetch single event to get ticket list
      const data = await apiFetch(`/events/${ev.id}`);
      const tickets = data.tickets || [];
      renderSeatPicker(tickets);
    } catch (e) {
      document.getElementById('modalBody').innerHTML =
        `<p class="empty-state">Failed to load seats: ${escHtml(e.message)}</p>`;
    }
  }

  function closeSeatModal() {
    document.getElementById('seatModal').classList.add('hidden');
    selectedTickets = {};
  }

  function handleModalBackdropClick(e) {
    if (e.target === document.getElementById('seatModal')) closeSeatModal();
  }

  function renderSeatPicker(tickets) {
    const body = document.getElementById('modalBody');
    if (!tickets.length) {
      body.innerHTML = '<p class="empty-state">No seats available for this event.</p>';
      return;
    }

    // Group by section
    const sections = {};
    tickets.forEach(t => {
      const key = t.section || 'General';
      if (!sections[key]) sections[key] = [];
      sections[key].push(t);
    });

    body.innerHTML = '';
    Object.entries(sections).forEach(([sectionName, sectionTickets]) => {
      const label = document.createElement('div');
      label.className = 'section-label';
      label.textContent = `Section ${sectionName}`;
      body.appendChild(label);

      const grid = document.createElement('div');
      grid.className = 'ticket-grid';

      sectionTickets.forEach(t => {
        const isUnavailable = t.status !== 'AVAILABLE';
        const chip = document.createElement('label');
        chip.className = 'ticket-chip' + (isUnavailable ? ' unavailable' : '');
        chip.dataset.ticketId = t.id;
        chip.innerHTML = `
          <input type="checkbox" value="${t.id}" ${isUnavailable ? 'disabled' : ''} onchange="toggleTicket(this, ${JSON.stringify(t).replace(/"/g, '&quot;')})">
          <div class="seat-label">Row ${escHtml(t.row)} · Seat ${escHtml(String(t.seatNumber))}</div>
          <div class="seat-price">${formatCurrency(t.price)}</div>
          ${isUnavailable ? '<div class="seat-status">Taken</div>' : ''}
        `;
        grid.appendChild(chip);
      });

      body.appendChild(grid);
    });
  }

  function toggleTicket(checkbox, ticket) {
    const chip = checkbox.closest('.ticket-chip');
    if (checkbox.checked) {
      selectedTickets[ticket.id] = ticket;
      chip.classList.add('selected');
    } else {
      delete selectedTickets[ticket.id];
      chip.classList.remove('selected');
    }
    updateModalFooter();
  }

  function updateModalFooter() {
    const tickets = Object.values(selectedTickets);
    const total   = tickets.reduce((s, t) => s + Number(t.price), 0);
    const count   = tickets.length;
    document.getElementById('selectedTotal').textContent = formatCurrency(total);
    document.getElementById('selectedCount').textContent = count ? ` (${count} seat${count > 1 ? 's' : ''})` : '';
    document.getElementById('reserveBtn').disabled = count === 0;
  }

  async function reserveSelected() {
    const ticketIDs = Object.keys(selectedTickets);
    if (!ticketIDs.length) return;

    const btn = document.getElementById('reserveBtn');
    btn.disabled    = true;
    btn.textContent = 'Reserving…';

    try {
      await apiFetch('/booking/reserve', {
        method: 'POST',
        body:   JSON.stringify({ ticketIds: ticketIDs }),
      });
      closeSeatModal();
      showToast('Seats reserved! You have 10 minutes to confirm.', 'success');
      await loadEvents();
      // Switch to My Bookings tab
      const bookingsBtn = document.querySelector('nav button:nth-child(2)');
      showPage('bookings', bookingsBtn);
    } catch (e) {
      showToast(`Reservation failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Reserve Seats';
    }
  }

  // ── My Bookings ────────────────────────────────────────────────────────────
  function clearAllCountdowns() {
    Object.values(countdownIntervals).forEach(clearInterval);
    countdownIntervals = {};
  }

  async function loadMyBookings() {
    clearAllCountdowns();
    const container = document.getElementById('bookings-container');
    if (!currentUserID) {
      container.innerHTML = '<p class="empty-state">Select a user to view bookings.</p>';
      return;
    }
    container.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await apiFetch('/booking/mine');
      renderBookings(data.bookings || []);
    } catch (e) {
      container.innerHTML = `<p class="empty-state">Failed to load bookings: ${escHtml(e.message)}</p>`;
    }
  }

  function renderBookings(bookings) {
    clearAllCountdowns();
    const container = document.getElementById('bookings-container');
    if (!bookings.length) {
      container.innerHTML = '<p class="empty-state">No active bookings.</p>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'booking-list';

    bookings.forEach(b => {
      const ev        = eventsCache.find(e => e.id === b.eventId);
      const eventName = ev ? ev.name : `Event ${b.eventId.slice(0, 8)}…`;
      const eventDate = ev
        ? new Date(ev.dateTime).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
        : '';

      const isReserved  = b.status === 'RESERVED';
      const isConfirmed = b.status === 'CONFIRMED';

      const item = document.createElement('div');
      item.className = `booking-item ${isReserved ? 'reserved' : isConfirmed ? 'confirmed' : ''}`;
      item.id = `booking-item-${b.id}`;

      // Build status badge
      let badgeHtml = '';
      if (isReserved)       badgeHtml = '<span class="badge badge-reserved-label">Reserved</span>';
      else if (isConfirmed) badgeHtml = '<span class="badge badge-confirmed-label">Confirmed</span>';

      const ticketCount = (b.ticketIds || []).length;
      const price       = formatCurrency(b.totalPrice);

      item.innerHTML = `
        <div class="info">
          <h3>${escHtml(eventName)} ${badgeHtml}</h3>
          ${eventDate ? `<p>📅 ${eventDate}</p>` : ''}
          <p>${ticketCount} seat${ticketCount !== 1 ? 's' : ''} &nbsp;·&nbsp; ${price}</p>
          ${isReserved ? `<div class="countdown" id="countdown-${b.id}">⏰ calculating…</div>` : ''}
          <div class="booking-id">#${b.id}</div>
        </div>
        <div class="booking-actions" id="actions-${b.id}"></div>
      `;

      list.appendChild(item);

      // Build action buttons
      const actions = item.querySelector(`#actions-${b.id}`);

      if (isReserved) {
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn btn-success btn-sm';
        confirmBtn.textContent = 'Confirm Purchase';
        confirmBtn.onclick = () => confirmBooking(b.id, confirmBtn);
        actions.appendChild(confirmBtn);

        startCountdown(b, confirmBtn);
      }

      if (isReserved || isConfirmed) {
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn btn-outline btn-sm';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.onclick = () => cancelBooking(b.id, cancelBtn);
        actions.appendChild(cancelBtn);
      }
    });

    container.innerHTML = '';
    container.appendChild(list);
  }

  function startCountdown(booking, confirmBtn) {
    const expiresAt = new Date(booking.createdAt).getTime() + RESERVATION_TTL_MS;

    function tick() {
      const el        = document.getElementById(`countdown-${booking.id}`);
      if (!el) { clearInterval(countdownIntervals[booking.id]); return; }

      const remaining = expiresAt - Date.now();
      if (remaining <= 0) {
        el.textContent = '⏰ Reservation expired';
        el.className   = 'countdown expired';
        if (confirmBtn) confirmBtn.disabled = true;
        clearInterval(countdownIntervals[booking.id]);
        return;
      }

      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      el.textContent = `⏰ ${mins}:${String(secs).padStart(2, '0')} to confirm`;
      el.className   = `countdown${remaining < 60000 ? ' urgent' : ''}`;
    }

    tick();
    countdownIntervals[booking.id] = setInterval(tick, 1000);
  }

  async function confirmBooking(bookingID, btn) {
    btn.disabled    = true;
    btn.textContent = 'Confirming…';
    try {
      await apiFetch('/booking/confirm', {
        method: 'POST',
        body:   JSON.stringify({ bookingId: bookingID, paymentDetails: null }),
      });
      showToast('Booking confirmed!', 'success');
      await Promise.all([loadMyBookings(), loadEvents()]);
    } catch (e) {
      showToast(`Confirmation failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Confirm Purchase';
    }
  }

  async function cancelBooking(bookingID, btn) {
    btn.disabled    = true;
    btn.textContent = 'Cancelling…';
    try {
      await apiFetch(`/booking/${bookingID}`, { method: 'DELETE' });
      showToast('Booking cancelled. Seats released.', 'success');
      await Promise.all([loadMyBookings(), loadEvents()]);
    } catch (e) {
      showToast(`Cancel failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Cancel';
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadUsers();
  loadEvents();
</script>
</body>
</html>
