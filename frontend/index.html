<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event Ticket Booking</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 700; }

    .user-selector { display: flex; align-items: center; gap: 0.5rem; }
    .user-selector label { font-size: 0.875rem; color: #ccc; }
    .user-selector select {
      padding: 0.35rem 0.6rem;
      border-radius: 6px;
      border: none;
      font-size: 0.875rem;
      background: #fff;
      cursor: pointer;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      display: flex;
    }
    nav button {
      padding: 0.75rem 1.5rem;
      border: none;
      background: none;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 3px solid transparent;
      color: #555;
    }
    nav button.active {
      border-bottom-color: #1a1a2e;
      color: #1a1a2e;
      font-weight: 600;
    }

    main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }

    .page { display: none; }
    .page.active { display: block; }

    h2 { font-size: 1.2rem; margin-bottom: 1rem; color: #333; }

    /* ── Event cards ─────────────────────────────────────────────────────────── */
    .events-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }
    .event-card {
      background: #fff;
      border-radius: 10px;
      padding: 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .event-card h3 { font-size: 1rem; font-weight: 700; }
    .event-card .meta { font-size: 0.8rem; color: #666; }
    .event-card .venue { font-size: 0.8rem; color: #888; }

    .capacity-bar {
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 0.25rem;
    }
    .capacity-bar-fill {
      height: 100%;
      background: #4caf50;
      border-radius: 3px;
      transition: width 0.3s;
    }
    .capacity-bar-fill.warn { background: #ff9800; }
    .capacity-bar-fill.full { background: #f44336; }
    .capacity-label {
      font-size: 0.78rem;
      color: #555;
      display: flex;
      justify-content: space-between;
    }

    /* Quantity stepper + reserve row */
    .reserve-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: auto;
    }
    .qty-stepper {
      display: flex;
      align-items: center;
      border: 1.5px solid #ddd;
      border-radius: 6px;
      overflow: hidden;
    }
    .qty-stepper button {
      width: 28px;
      height: 28px;
      border: none;
      background: #f5f5f5;
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      color: #333;
    }
    .qty-stepper button:hover { background: #e8e8e8; }
    .qty-stepper span {
      width: 28px;
      text-align: center;
      font-size: 0.875rem;
      font-weight: 600;
      user-select: none;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────────── */
    .btn {
      flex: 1;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 6px;
      font-size: 0.875rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.15s, background 0.15s;
    }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary  { background: #1a1a2e; color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: #2d2d5e; }
    .btn-success  { background: #388e3c; color: #fff; }
    .btn-success:hover:not(:disabled)  { background: #2e7d32; }
    .btn-danger   { background: #f44336; color: #fff; }
    .btn-danger:hover:not(:disabled)   { background: #c62828; }
    .btn-outline  { background: transparent; color: #1a1a2e; border: 1.5px solid #1a1a2e; }
    .btn-outline:hover:not(:disabled)  { background: #f0f0f8; }
    .btn-sm { padding: 0.3rem 0.7rem; font-size: 0.8rem; flex: unset; }

    .badge-sold-out {
      display: inline-block;
      background: #f44336;
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* ── Toast ───────────────────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      color: #fff;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      z-index: 999;
      max-width: 320px;
    }
    #toast.show { opacity: 1; }
    #toast.success { background: #388e3c; }
    #toast.error   { background: #d32f2f; }

    /* ── Bookings list ───────────────────────────────────────────────────────── */
    .booking-list { display: flex; flex-direction: column; gap: 0.75rem; }
    .booking-item {
      background: #fff;
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .booking-item.reserved  { border-left: 4px solid #ff9800; }
    .booking-item.confirmed { border-left: 4px solid #4caf50; }

    .booking-item .info h3 { font-size: 0.95rem; font-weight: 600; }
    .booking-item .info p  { font-size: 0.8rem; color: #777; margin-top: 0.2rem; }
    .booking-item .info .booking-id { font-size: 0.75rem; color: #aaa; margin-top: 0.15rem; font-family: monospace; }

    .badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.15rem 0.45rem;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .badge-reserved-label  { background: #fff3e0; color: #e65100; }
    .badge-confirmed-label { background: #e8f5e9; color: #1b5e20; }

    .countdown {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #e65100;
      margin-top: 0.3rem;
    }
    .countdown.urgent  { color: #d32f2f; }
    .countdown.expired { color: #999; }

    .booking-actions {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .empty-state { color: #999; font-size: 0.9rem; text-align: center; padding: 3rem 0; }

    .spinner {
      border: 3px solid #e0e0e0;
      border-top-color: #1a1a2e;
      border-radius: 50%;
      width: 28px; height: 28px;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<header>
  <h1>🎟 Event Booking</h1>
  <div class="user-selector">
    <label for="userSelect">Booking as:</label>
    <select id="userSelect">
      <option value="">— select user —</option>
    </select>
  </div>
</header>

<nav>
  <button data-page="events" class="active" onclick="showPage('events')">Events</button>
  <button data-page="bookings" onclick="showPage('bookings')">My Bookings</button>
</nav>

<main>
  <div id="page-events" class="page active">
    <h2>Upcoming Events</h2>
    <div id="events-container"><div class="spinner"></div></div>
  </div>

  <div id="page-bookings" class="page">
    <h2>My Bookings</h2>
    <div id="bookings-container"><div class="spinner"></div></div>
  </div>
</main>

<div id="toast"></div>

<script>
  // Same hostname as the page so the browser origin matches the API host.
  const API = `http://${window.location.hostname}:8085`;

  // ── State ──────────────────────────────────────────────────────────────────
  let currentUserID = localStorage.getItem('userId') || '';
  let eventsCache   = [];
  let countdownIntervals = {};

  // ── Helpers ────────────────────────────────────────────────────────────────
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `show ${type}`;
    setTimeout(() => { t.className = ''; }, 3500);
  }

  function activateTab(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(`page-${name}`).classList.add('active');
    document.querySelector(`nav button[data-page="${name}"]`).classList.add('active');
    localStorage.setItem('activeTab', name);
  }

  function showPage(name) {
    activateTab(name);
    if (name === 'bookings') loadMyBookings();
    if (name === 'events')   loadEvents();
  }

  async function apiFetch(path, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
    if (currentUserID) headers['X-User-ID'] = currentUserID;
    const res = await fetch(`${API}${path}`, { ...options, headers });
    if (res.status === 204) return null;
    const body = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(body.error || `HTTP ${res.status}`);
    return body;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function formatCurrency(n) {
    return '$' + Number(n).toFixed(2);
  }

  // ── Users ──────────────────────────────────────────────────────────────────
  async function loadUsers() {
    try {
      const data = await apiFetch('/users');
      const sel = document.getElementById('userSelect');
      (data.users || []).forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.id;
        opt.textContent = u.name;
        sel.appendChild(opt);
      });
      // Restore previously selected user
      if (currentUserID) {
        sel.value = currentUserID;
        if (!sel.value) {
          // Saved ID no longer exists in the list
          currentUserID = '';
          localStorage.removeItem('userId');
        }
        loadEvents();
      }
    } catch (e) {
      console.error('Failed to load users', e);
    }
  }

  document.getElementById('userSelect').addEventListener('change', e => {
    currentUserID = e.target.value;
    if (currentUserID) {
      localStorage.setItem('userId', currentUserID);
    } else {
      localStorage.removeItem('userId');
    }
    loadEvents();
  });

  // ── Events ─────────────────────────────────────────────────────────────────
  async function loadEvents() {
    const container = document.getElementById('events-container');
    container.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await apiFetch('/events');
      eventsCache = data.events || [];
      renderEvents(eventsCache);
    } catch (e) {
      container.innerHTML = `<p class="empty-state">Failed to load events: ${escHtml(e.message)}</p>`;
    }
  }

  function renderEvents(events) {
    const container = document.getElementById('events-container');
    if (!events || events.length === 0) {
      container.innerHTML = '<p class="empty-state">No events found.</p>';
      return;
    }
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'events-grid';
    events.forEach(ev => grid.appendChild(buildEventCard(ev)));
    container.appendChild(grid);
  }

  function buildEventCard(ev) {
    const isSoldOut = ev.availableCount === 0;
    const booked    = ev.capacity - ev.availableCount;
    const pct       = ev.capacity > 0 ? Math.round((booked / ev.capacity) * 100) : 0;
    const fillClass = pct >= 100 ? 'full' : pct >= 75 ? 'warn' : '';
    const date      = new Date(ev.dateTime).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' });

    const card = document.createElement('div');
    card.className = 'event-card';
    card.innerHTML = `
      <h3>${escHtml(ev.name)}</h3>
      <p class="meta">📅 ${date}</p>
      <p class="venue">📍 ${escHtml(ev.venue?.name || '')} &nbsp;·&nbsp; 🎤 ${escHtml(ev.performer?.name || '')}</p>
      <div class="capacity-label">
        <span>${isSoldOut
          ? '<span class="badge-sold-out">Sold out</span>'
          : `${ev.availableCount} seat${ev.availableCount !== 1 ? 's' : ''} available`
        }</span>
        <span>${booked} / ${ev.capacity} booked</span>
      </div>
      <div class="capacity-bar">
        <div class="capacity-bar-fill ${fillClass}" style="width:${pct}%"></div>
      </div>
    `;

    // Quantity stepper + reserve button
    const reserveRow = document.createElement('div');
    reserveRow.className = 'reserve-row';

    let quantity = 1;

    if (!isSoldOut) {
      const stepper = document.createElement('div');
      stepper.className = 'qty-stepper';
      const qtySpan = document.createElement('span');
      qtySpan.textContent = '1';

      const dec = document.createElement('button');
      dec.textContent = '−';
      dec.onclick = () => {
        if (quantity > 1) { quantity--; qtySpan.textContent = quantity; }
      };
      const inc = document.createElement('button');
      inc.textContent = '+';
      inc.onclick = () => {
        if (quantity < ev.availableCount) { quantity++; qtySpan.textContent = quantity; }
      };

      stepper.appendChild(dec);
      stepper.appendChild(qtySpan);
      stepper.appendChild(inc);
      reserveRow.appendChild(stepper);
    }

    const btn = document.createElement('button');
    btn.className = 'btn btn-primary';
    btn.textContent = isSoldOut ? 'Sold Out' : 'Reserve';
    btn.disabled    = isSoldOut || !currentUserID;
    btn.title       = !currentUserID ? 'Select a user first' : '';
    btn.onclick     = () => reserveEvent(ev.id, quantity, btn);
    reserveRow.appendChild(btn);

    card.appendChild(reserveRow);
    return card;
  }

  async function reserveEvent(eventID, quantity, btn) {
    if (!currentUserID) { showToast('Please select a user first', 'error'); return; }
    btn.disabled    = true;
    btn.textContent = 'Reserving…';
    try {
      await apiFetch('/booking/reserve', {
        method: 'POST',
        body:   JSON.stringify({ eventId: eventID, quantity }),
      });
      showToast(`${quantity} seat${quantity > 1 ? 's' : ''} reserved! Confirm within the given time.`, 'success');
      await loadEvents();
      showPage('bookings');
    } catch (e) {
      showToast(`Reservation failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Reserve';
    }
  }

  // ── My Bookings ────────────────────────────────────────────────────────────
  function clearAllCountdowns() {
    Object.values(countdownIntervals).forEach(clearInterval);
    countdownIntervals = {};
  }

  async function loadMyBookings() {
    clearAllCountdowns();
    const container = document.getElementById('bookings-container');
    if (!currentUserID) {
      container.innerHTML = '<p class="empty-state">Select a user to view bookings.</p>';
      return;
    }
    container.innerHTML = '<div class="spinner"></div>';
    try {
      const data = await apiFetch('/booking/mine');
      renderBookings(data.bookings || []);
    } catch (e) {
      container.innerHTML = `<p class="empty-state">Failed to load bookings: ${escHtml(e.message)}</p>`;
    }
  }

  function renderBookings(bookings) {
    clearAllCountdowns();
    const container = document.getElementById('bookings-container');
    if (!bookings.length) {
      container.innerHTML = '<p class="empty-state">No active bookings.</p>';
      return;
    }

    const list = document.createElement('div');
    list.className = 'booking-list';

    bookings.forEach(b => {
      const ev        = eventsCache.find(e => e.id === b.eventId);
      const eventName = ev ? ev.name : `Event ${b.eventId.slice(0, 8)}…`;
      const eventDate = ev
        ? new Date(ev.dateTime).toLocaleString(undefined, { dateStyle: 'medium', timeStyle: 'short' })
        : '';

      const isReserved  = b.status === 'RESERVED';
      const isConfirmed = b.status === 'CONFIRMED';

      const item = document.createElement('div');
      item.className = `booking-item ${isReserved ? 'reserved' : isConfirmed ? 'confirmed' : ''}`;

      let badgeHtml = '';
      if (isReserved)       badgeHtml = '<span class="badge badge-reserved-label">Reserved</span>';
      else if (isConfirmed) badgeHtml = '<span class="badge badge-confirmed-label">Confirmed</span>';

      const ticketCount = (b.ticketIds || []).length;

      item.innerHTML = `
        <div class="info">
          <h3>${escHtml(eventName)} ${badgeHtml}</h3>
          ${eventDate ? `<p>📅 ${eventDate}</p>` : ''}
          <p>${ticketCount} seat${ticketCount !== 1 ? 's' : ''} &nbsp;·&nbsp; ${formatCurrency(b.totalPrice)}</p>
          ${isReserved ? `<div class="countdown" id="countdown-${b.id}">⏰ calculating…</div>` : ''}
          <div class="booking-id">#${b.id}</div>
        </div>
        <div class="booking-actions" id="actions-${b.id}"></div>
      `;

      list.appendChild(item);

      const actions = item.querySelector(`#actions-${b.id}`);

      if (isReserved) {
        const confirmBtn = document.createElement('button');
        confirmBtn.className = 'btn-sm btn btn-success';
        confirmBtn.textContent = 'Confirm Purchase';
        confirmBtn.onclick = () => confirmBooking(b.id, confirmBtn);
        actions.appendChild(confirmBtn);
        startCountdown(b, confirmBtn);
      }

      if (isReserved || isConfirmed) {
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'btn-sm btn btn-outline';
        cancelBtn.textContent = 'Cancel';
        cancelBtn.onclick = () => cancelBooking(b.id, cancelBtn);
        actions.appendChild(cancelBtn);
      }
    });

    container.innerHTML = '';
    container.appendChild(list);
  }

  function startCountdown(booking, confirmBtn) {
    const expiresAt = new Date(booking.expiresAt).getTime();

    function tick() {
      const el = document.getElementById(`countdown-${booking.id}`);
      if (!el) { clearInterval(countdownIntervals[booking.id]); return; }

      const remaining = expiresAt - Date.now();
      if (remaining <= 0) {
        el.textContent = '⏰ Reservation expired';
        el.className   = 'countdown expired';
        if (confirmBtn) confirmBtn.disabled = true;
        clearInterval(countdownIntervals[booking.id]);
        return;
      }

      const mins = Math.floor(remaining / 60000);
      const secs = Math.floor((remaining % 60000) / 1000);
      el.textContent = `⏰ ${mins}:${String(secs).padStart(2, '0')} to confirm`;
      el.className   = `countdown${remaining < 60000 ? ' urgent' : ''}`;
    }

    tick();
    countdownIntervals[booking.id] = setInterval(tick, 1000);
  }

  async function confirmBooking(bookingID, btn) {
    btn.disabled    = true;
    btn.textContent = 'Confirming…';
    try {
      await apiFetch('/booking/confirm', {
        method: 'POST',
        body:   JSON.stringify({ bookingId: bookingID, paymentDetails: null }),
      });
      showToast('Booking confirmed!', 'success');
      await Promise.all([loadMyBookings(), loadEvents()]);
    } catch (e) {
      showToast(`Confirmation failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Confirm Purchase';
    }
  }

  async function cancelBooking(bookingID, btn) {
    btn.disabled    = true;
    btn.textContent = 'Cancelling…';
    try {
      await apiFetch(`/booking/${bookingID}`, { method: 'DELETE' });
      showToast('Booking cancelled. Seats released.', 'success');
      await Promise.all([loadMyBookings(), loadEvents()]);
    } catch (e) {
      showToast(`Cancel failed: ${e.message}`, 'error');
      btn.disabled    = false;
      btn.textContent = 'Cancel';
    }
  }

  // ── Boot ───────────────────────────────────────────────────────────────────
  loadUsers();        // restores user dropdown; calls loadEvents() when selection is applied
  loadEvents();       // always pre-populate eventsCache (needed for booking event names)

  const savedTab = localStorage.getItem('activeTab') || 'events';
  activateTab(savedTab);                       // restore DOM state immediately (no flash)
  if (savedTab === 'bookings') loadMyBookings(); // load bookings data if that tab is active
</script>
</body>
</html>
